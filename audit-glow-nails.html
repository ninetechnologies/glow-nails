<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Audit RDV — Glow Nails</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f9f9f9; color: #1a1a2e; padding: 24px; max-width: 1100px; margin: 0 auto; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    .subtitle { color: #6b7280; font-size: 13px; margin-bottom: 24px; }
    .login-box { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 24px; max-width: 360px; margin-bottom: 24px; }
    .login-box h2 { font-size: 15px; margin-bottom: 16px; }
    input { width: 100%; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; font-size: 14px; margin-bottom: 10px; }
    button { background: #1a1a2e; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
    button:hover { background: #2d2d4e; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .section { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .section h2 { font-size: 15px; margin-bottom: 12px; }
    .badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 99px; }
    .badge-red { background: #fee2e2; color: #dc2626; }
    .badge-orange { background: #fef3c7; color: #d97706; }
    .badge-green { background: #dcfce7; color: #16a34a; }
    .badge-blue { background: #dbeafe; color: #2563eb; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 10px; background: #f3f4f6; font-weight: 600; font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 10px; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    .conflict td { background: #fff7f7; }
    .ok td { background: #f0fdf4; }
    .stat-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    .stat { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px 18px; flex: 1; min-width: 100px; text-align: center; }
    .stat .n { font-size: 28px; font-weight: 700; }
    .stat .l { font-size: 11px; color: #6b7280; margin-top: 2px; }
    .alert-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; font-size: 13px; line-height: 1.6; color: #991b1b; }
    .ok-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; font-size: 13px; color: #166534; }
    .tag-today { background: #fef3c7; color: #92400e; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px; margin-left: 4px; }
    .encours { color: #16a34a; font-size: 10px; font-weight: 700; margin-left: 4px; }
    .err { color: #dc2626; font-size: 13px; margin-top: 8px; }
    #output { margin-top: 8px; }
  </style>
</head>
<body>

<h1>🔍 Audit RDV — Glow Nails</h1>
<p class="subtitle">Lecture seule · Aucune modification · Connectez-vous en tant que Marion</p>

<div class="login-box">
  <h2>🔐 Connexion admin</h2>
  <input type="email" id="email" placeholder="Email" value="glownails.contact31@gmail.com"/>
  <input type="password" id="pwd" placeholder="Mot de passe Marion"/>
  <button id="btn-login" onclick="window.doLogin()">Connexion + Audit</button>
  <p class="err" id="login-err"></p>
</div>

<div id="output"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app  = initializeApp({ apiKey:"AIzaSyB1R9I0KVkRNL7da3cOWUk9gIhqp0X0748", authDomain:"glow-nails-app.firebaseapp.com", projectId:"glow-nails-app", storageBucket:"glow-nails-app.firebasestorage.app", messagingSenderId:"789690603842", appId:"1:789690603842:web:a90759e8bb7edf66bcd0db" });
const auth = getAuth(app);
const db   = getFirestore(app);
const MOIS = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];

function pH(h){ if(!h)return 0; const[a,b]=h.split("h").map(Number); return a*60+(b||0); }
function fH(m){ return Math.floor(m/60)+"h"+(m%60?String(m%60).padStart(2,"0"):"00"); }
function dK(r){ return `${r.annee}-${r.mois}-${r.jour}`; }

window.doLogin = async function(){
  const email=document.getElementById("email").value.trim();
  const pwd=document.getElementById("pwd").value;
  const btn=document.getElementById("btn-login");
  const err=document.getElementById("login-err");
  err.textContent=""; btn.disabled=true; btn.textContent="Connexion…";
  try {
    await signInWithEmailAndPassword(auth,email,pwd);
    btn.textContent="✅ Connecté — audit en cours…";
    await runAudit();
  } catch(e){
    err.textContent = e.code==="auth/wrong-password"||e.code==="auth/invalid-credential" ? "Mot de passe incorrect" : e.code==="auth/user-not-found" ? "Email introuvable" : e.message;
    btn.disabled=false; btn.textContent="Connexion + Audit";
  }
};

async function runAudit(){
  const out=document.getElementById("output");
  out.innerHTML=`<div style="text-align:center;padding:32px;color:#6b7280">⏳ Lecture Firestore…</div>`;
  try {
    const snap = await getDocs(collection(db,"rdvs"));
    const all  = snap.docs.map(d=>({id:d.id,...d.data()}));
    const actifs = all.filter(r=>r.statut==="confirme"||r.statut==="en_attente");
    const now=new Date(), todayK=dK({annee:now.getFullYear(),mois:now.getMonth(),jour:now.getDate()}), nowMin=now.getHours()*60+now.getMinutes();

    actifs.sort((a,b)=> new Date(a.annee,a.mois,a.jour)-new Date(b.annee,b.mois,b.jour) || pH(a.heure)-pH(b.heure));

    // Chevauchements
    const byDay={};
    for(const r of actifs){ const k=dK(r); if(!byDay[k])byDay[k]=[]; byDay[k].push(r); }
    const conflicts=[];
    for(const rdvs of Object.values(byDay)){
      for(let i=0;i<rdvs.length;i++) for(let j=i+1;j<rdvs.length;j++){
        const a=rdvs[i],b=rdvs[j];
        const aS=pH(a.heure),aE=aS+(a.duree||0),bS=pH(b.heure),bE=bS+(b.duree||0);
        if(aS<bE&&bS<aE) conflicts.push({r1:a,r2:b,day:dK(a)});
      }
    }

    const tooSoon=actifs.filter(r=>{ const dt=new Date(r.annee,r.mois,r.jour,Math.floor(pH(r.heure)/60),pH(r.heure)%60); const d=dt-now; return d>0&&d<86400000; });
    const today=actifs.filter(r=>dK(r)===todayK).sort((a,b)=>pH(a.heure)-pH(b.heure));
    const aVenir=actifs.filter(r=>new Date(r.annee,r.mois,r.jour)>=new Date(now.getFullYear(),now.getMonth(),now.getDate()));
    const cIds=new Set(conflicts.flatMap(c=>[c.r1.id,c.r2.id]));

    let h=`<div class="stat-row">
      <div class="stat"><div class="n">${actifs.length}</div><div class="l">RDV actifs</div></div>
      <div class="stat"><div class="n" style="color:#d97706">${today.length}</div><div class="l">Aujourd'hui</div></div>
      <div class="stat"><div class="n" style="color:${conflicts.length?"#dc2626":"#16a34a"}">${conflicts.length}</div><div class="l">Chevauchements</div></div>
      <div class="stat"><div class="n" style="color:#2563eb">${tooSoon.length}</div><div class="l">&lt; 24h</div></div>
      <div class="stat"><div class="n">${aVenir.length}</div><div class="l">À venir</div></div>
    </div>`;

    h += conflicts.length===0
      ? `<div class="ok-box">✅ Aucun chevauchement détecté. Vous pouvez déployer les patches sans risque pour les RDV existants.</div>`
      : `<div class="alert-box">⚠️ <strong>${conflicts.length} chevauchement(s) détecté(s)</strong> dans les RDV existants. Marion doit les traiter manuellement avant ou après déploiement.</div>`;

    // Planning aujourd'hui
    h+=`<div class="section"><h2>📅 Planning du 28 mars <span class="badge badge-orange">Aujourd'hui</span></h2>`;
    if(!today.length){ h+=`<p style="color:#6b7280;font-size:13px">Aucun RDV actif aujourd'hui.</p>`; }
    else {
      h+=`<table><thead><tr><th>Heure</th><th>Fin</th><th>Cliente</th><th>Prestation</th><th>Min</th><th>Statut</th><th></th></tr></thead><tbody>`;
      for(const r of today){
        const s=pH(r.heure),e=s+(r.duree||0),isNow=s<=nowMin&&e>nowMin,conflict=cIds.has(r.id);
        h+=`<tr class="${conflict?"conflict":""}"><td><strong>${r.heure}</strong>${isNow?`<span class="encours">● EN COURS</span>`:""}</td><td>${fH(e)}</td><td>${r.prenom||""} ${r.nom||""}<br><small style="color:#6b7280">${r.email||""}</small></td><td style="font-size:12px">${r.prestation||""}</td><td>${r.duree||"?"}</td><td><span class="badge ${r.statut==="confirme"?"badge-green":"badge-orange"}">${r.statut}</span></td><td>${conflict?"🔴":"✅"}</td></tr>`;
      }
      h+=`</tbody></table>`;
    }
    h+=`</div>`;

    // Chevauchements
    if(conflicts.length){
      h+=`<div class="section"><h2>🔴 Chevauchements <span class="badge badge-red">${conflicts.length}</span></h2><table><thead><tr><th>Date</th><th>RDV 1</th><th>RDV 2</th><th>Overlap</th></tr></thead><tbody>`;
      for(const c of conflicts){
        const{r1,r2}=c,s1=pH(r1.heure),e1=s1+(r1.duree||0),s2=pH(r2.heure),e2=s2+(r2.duree||0),oS=Math.max(s1,s2),oE=Math.min(e1,e2),isT=c.day===todayK;
        h+=`<tr class="conflict"><td>${r1.jour} ${MOIS[r1.mois]}${isT?`<span class="tag-today">AUJOURD'HUI</span>`:""}</td><td><strong>${r1.heure}</strong>→${fH(e1)}<br>${r1.prenom||""} ${r1.nom||""}<br><small>${r1.prestation||""}</small></td><td><strong>${r2.heure}</strong>→${fH(e2)}<br>${r2.prenom||""} ${r2.nom||""}<br><small>${r2.prestation||""}</small></td><td style="color:#dc2626;font-weight:600">${fH(oS)}→${fH(oE)}<br><small>${oE-oS} min</small></td></tr>`;
      }
      h+=`</tbody></table></div>`;
    }

    // < 24h
    if(tooSoon.length){
      h+=`<div class="section"><h2>⏰ Dans les 24h <span class="badge badge-blue">${tooSoon.length}</span></h2><p style="font-size:13px;color:#6b7280;margin-bottom:12px">Existants avant le patch — non affectés par la règle 24h.</p><table><thead><tr><th>Date</th><th>Heure</th><th>Cliente</th><th>Prestation</th><th>Statut</th></tr></thead><tbody>`;
      for(const r of tooSoon.sort((a,b)=>new Date(a.annee,a.mois,a.jour)-new Date(b.annee,b.mois,b.jour)||pH(a.heure)-pH(b.heure))){
        h+=`<tr><td>${r.jour} ${MOIS[r.mois]}</td><td><strong>${r.heure}</strong></td><td>${r.prenom||""} ${r.nom||""}</td><td style="font-size:12px">${r.prestation||""}</td><td><span class="badge ${r.statut==="confirme"?"badge-green":"badge-orange"}">${r.statut}</span></td></tr>`;
      }
      h+=`</tbody></table></div>`;
    }

    // Tous à venir
    h+=`<div class="section"><h2>📋 Tous les RDV à venir <span class="badge badge-blue">${aVenir.length}</span></h2><table><thead><tr><th>Date</th><th>Heure</th><th>Fin</th><th>Cliente</th><th>Prestation</th><th>Min</th><th>Statut</th><th></th></tr></thead><tbody>`;
    for(const r of aVenir){
      const s=pH(r.heure),e=s+(r.duree||0),conflict=cIds.has(r.id),isT=dK(r)===todayK;
      h+=`<tr class="${conflict?"conflict":"ok"}"><td>${r.jour} ${MOIS[r.mois]}${isT?`<span class="tag-today">auj.</span>`:""}</td><td><strong>${r.heure}</strong></td><td>${fH(e)}</td><td>${r.prenom||""} ${r.nom||""}<br><small style="color:#6b7280">${r.email||""}</small></td><td style="font-size:12px">${r.prestation||""}</td><td>${r.duree||"?"}</td><td><span class="badge ${r.statut==="confirme"?"badge-green":"badge-orange"}">${r.statut}</span></td><td>${conflict?"🔴 Conflit":"✅ OK"}</td></tr>`;
    }
    h+=`</tbody></table></div>`;

    out.innerHTML=h;
  } catch(e){
    out.innerHTML=`<div class="alert-box">❌ Erreur : ${e.message}</div>`;
    console.error(e);
  }
}
</script>
</body>
</html>
